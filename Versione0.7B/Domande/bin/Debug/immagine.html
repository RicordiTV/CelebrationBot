<!DOCTYPE html>
<html>
<head>
	<title>Aggiornamento AJAX del contenuto HTML</title>
	<script>
		function aggiornaContenuto() {
			var xmlhttp = new XMLHttpRequest();
			xmlhttp.onreadystatechange = function() {
				if (this.readyState == 4 && this.status == 200) {
					document.getElementById("contenuto").innerHTML = this.responseText;
				}
			};
			xmlhttp.open("GET", "nuovoContenuto.html", true);
			xmlhttp.send();
		}
		setInterval(aggiornaContenuto, 1000); // Aggiorna il contenuto ogni secondo
	</script>
</head>
